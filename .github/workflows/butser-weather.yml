name: Butser weather collector

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "butser_weather/collector.py"
      - "butser_weather/requirements.txt"
      - ".github/workflows/butser-weather.yml"
  schedule:
    # Run at both possible UTC equivalents of 07:00 Europe/London.
    # collector.py exits harmlessly unless local time is 07:xx.
    - cron: "5 6 * * *"
    - cron: "5 7 * * *"

permissions:
  contents: write

concurrency:
  group: butser-weather
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: butser_weather/requirements.txt

      - name: Install dependencies
        run: pip install -r butser_weather/requirements.txt

      - name: Collect forecasts and observations
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python butser_weather/collector.py
          else
            python butser_weather/collector.py --force
          fi

      - name: Commit updated evidence
        run: |
          if git diff --quiet -- butser_weather/output; then
            echo "No output change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add butser_weather/output
          git commit -m "data: update Butser weather evidence"
          git push

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: butser-weather-${{ github.run_id }}
          path: butser_weather/output
          if-no-files-found: warn
          retention-days: 30
